replicaCount: 1

image:
  repository: jellyfin/jellyfin
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.appVersion

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8096
  httpsPort: 8920

ingress:
  enabled: true

  # Traefik IngressRoute config (recommended for k3s — uses native Traefik CRDs)
  traefik:
    enabled: true
    host: bwing
    path: /jellyfin
    # certResolver: ""  # Leave empty for self-signed (fine for a LAN hostname).
                        # Set to e.g. "letsencrypt" for an ACME cert.

  # Generic Kubernetes Ingress — only used when traefik.enabled=false
  className: ""
  annotations: {}
  hosts:
    - host: bwing
      paths:
        - path: /jellyfin
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

# Persistence for Jellyfin config/cache data
persistence:
  config:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi
    existingClaim: ""
  cache:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    existingClaim: ""

# Media library volumes — disabled in favour of hostPathVolumes below
mediaVolumes: []

# Host path mounts — maps directories on the k3s node directly into the container
hostPathVolumes:
  - name: share1
    hostPath: /media/share1
    mountPath: /media/share1
    readOnly: false
  - name: share2
    hostPath: /media/share2
    mountPath: /media/share2
    readOnly: false

env:
  - name: TZ
    value: "UTC"
  # Tell Jellyfin its public base URL so assets/redirects work under /jellyfin
  - name: JELLYFIN_PublishedServerUrl
    value: "https://bwing/jellyfin"

nodeSelector: {}
  # If on a multi-node cluster, pin to the node that has the host path mounts:
  # kubernetes.io/hostname: bwing

tolerations: []

affinity: {}

securityContext: {}
  # runAsUser: 1000
  # runAsGroup: 1000
  # fsGroup: 1000

podAnnotations: {}

hostNetwork: false