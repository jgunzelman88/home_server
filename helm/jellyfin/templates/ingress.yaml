{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.traefik.enabled }}
---
# Traefik Middleware: strip /jellyfin prefix before forwarding to Jellyfin
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "jellyfin.fullname" . }}-strip-prefix
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ .Values.ingress.traefik.path }}

---
# Traefik Middleware: redirect HTTP → HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "jellyfin.fullname" . }}-https-redirect
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
# HTTP IngressRoute — redirects everything to HTTPS
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "jellyfin.fullname" . }}-http
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .Values.ingress.traefik.host }}`) && PathPrefix(`{{ .Values.ingress.traefik.path }}`)
      kind: Rule
      middlewares:
        - name: {{ include "jellyfin.fullname" . }}-https-redirect
      services:
        - name: {{ include "jellyfin.fullname" . }}
          port: {{ .Values.service.port }}

---
# HTTPS IngressRoute — terminates TLS and proxies to Jellyfin
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "jellyfin.fullname" . }}-https
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.traefik.host }}`) && PathPrefix(`{{ .Values.ingress.traefik.path }}`)
      kind: Rule
      middlewares:
        - name: {{ include "jellyfin.fullname" . }}-strip-prefix
      services:
        - name: {{ include "jellyfin.fullname" . }}
          port: {{ .Values.service.port }}
  tls:
    {{- if .Values.ingress.traefik.certResolver }}
    certResolver: {{ .Values.ingress.traefik.certResolver }}
    {{- else }}
    # No certResolver set — Traefik will use its default self-signed cert.
    # For a LAN hostname like 'bwing' this is expected; accept the browser warning
    # or install the Traefik CA cert on your devices.
    {}
    {{- end }}

{{- else }}
---
# Generic Kubernetes Ingress (non-Traefik)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "jellyfin.fullname" . }}
  labels:
    {{- include "jellyfin.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "jellyfin.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
