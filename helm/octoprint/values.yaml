image:
  repository: octoprint/octoprint
  tag: canary
  pullPolicy: IfNotPresent

# Privileged so the container can talk to USB serial devices on the host
privileged: true

# Mount the host's /dev so the printer is found no matter how it enumerates
hostDev:
  enabled: true
  path: /dev

# Pin to the node the printer is physically plugged into, e.g.:
# nodeSelector:
#   kubernetes.io/hostname: bwing
nodeSelector: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: traefik
  host: bwing
  path: /octoprint
  # k3s >= v1.25 ships Traefik v2/v3 using traefik.io;
  # very old installs may need traefik.containo.us
  traefikApiVersion: traefik.io/v1alpha1
  annotations: {}

persistence:
  enabled: true
  size: 5Gi
  # empty = k3s default (local-path)
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

# Writes server.reverseProxy settings into OctoPrint's config.yaml at pod start
# so the UI/API work under the /octoprint subpath (OctoPrint 1.9+ ignores
# X-Script-Name from untrusted proxies, which makes the UI hang).
reverseProxyConfig:
  enabled: true
  scheme: http
  trustedDownstream:
    - 127.0.0.1/8
    - "::1"
    - 10.42.0.0/16   # stock k3s pod CIDR (Traefik pod)

# Set false ONLY to diagnose/work around "CSRF validation failed" behind the
# proxy chain; re-enable once resolved.
csrfProtection: true

env: []
#  - name: ENABLE_MJPG_STREAMER
#    value: "true"

resources: {}
