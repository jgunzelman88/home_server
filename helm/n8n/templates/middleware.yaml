{{- if .Values.ingress.enabled }}
# Traefik Middleware – strips "/n8n" from the request path before
# forwarding to the n8n pod.  n8n itself is configured with N8N_PATH=/n8n
# so it generates correct absolute URLs while receiving requests at "/".
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "n8n.fullname" . }}-stripprefix
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
spec:
  stripPrefix:
    prefixes:
      - {{ .Values.n8n.path }}
    # Preserve the original path in X-Forwarded-Prefix so n8n can
    # build correct redirect/asset URLs.
    forceSlash: true
{{- end }}
