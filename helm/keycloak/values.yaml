## Keycloak Image - official free image
image:
  repository: quay.io/keycloak/keycloak
  tag: "26.0"
  pullPolicy: IfNotPresent

## Keycloak command args
command:
  - "/opt/keycloak/bin/kc.sh"
  - "start"
  - "--hostname=bwing"
  - "--db=postgres"
  - "--health-enabled=true"
  - "--http-enabled=true"

## Override chart defaults
http:
  relativePath: "/keycloak"

cache:
  stack: kubernetes

## Keycloak environment variables - must be a string block for keycloakx
extraEnv: |
  - name: JAVA_OPTS_APPEND
    value: "-Xms512m -Xmx1024m"
  - name: KC_PROXY_HEADERS
    value: "xforwarded"
  - name: KC_BOOTSTRAP_ADMIN_USERNAME
    value: "admin"
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: admin-password
  - name: KC_DB_USERNAME
    value: "keycloak"
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-custom-secrets
        key: password
  - name: KC_DB_URL
    value: "jdbc:postgresql://keycloak-postgresql/keycloak"

## Replicas
replicas: 1

## Resource limits
resources:
  limits:
    cpu: "1000m"
    memory: "2Gi"
  requests:
    cpu: "500m"
    memory: "1Gi"

## Ingress Settings
ingress:
  enabled: true
  ingressClassName: traefik
  rules:
    - host: bwing
      paths:
        - path: /keycloak
          pathType: Prefix
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: keycloak-keycloak-headers@kubernetescrd
  tls: []

## Postgres deployed separately via init script
postgresql:
  enabled: false

## Probes - keycloak is slow to start
startupProbe: |
  httpGet:
    path: /keycloak/health
    port: http
  failureThreshold: 60
  periodSeconds: 5
  timeoutSeconds: 1

livenessProbe: |
  httpGet:
    path: /keycloak/health/live
    port: http
  initialDelaySeconds: 0
  timeoutSeconds: 5
  periodSeconds: 10

readinessProbe: |
  httpGet:
    path: /keycloak/health/ready
    port: http
  initialDelaySeconds: 0
  timeoutSeconds: 1
  periodSeconds: 10