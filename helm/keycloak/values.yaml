## Keycloak Image - official free image
image:
  repository: quay.io/keycloak/keycloak
  tag: "24.0"
  pullPolicy: IfNotPresent

## Keycloak command args
command:
  - "/opt/keycloak/bin/kc.sh"
  - "start"
  - "--http-relative-path=/keycloak"
  - "--hostname=bwing"
  - "--hostname-path=/keycloak"
  - "--proxy=edge"
  - "--db=postgres"

## Keycloak environment variables
extraEnv: |
  - name: KC_BOOTSTRAP_ADMIN_USERNAME
    value: "admin"
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: admin-password
  - name: KC_DB_USERNAME
    value: "keycloak"
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-custom-secrets
        key: password
  - name: KC_DB_URL
    value: "jdbc:postgresql://keycloak-postgresql/keycloak"

## Replicas
replicas: 1

## Resource limits
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

## Ingress Settings
ingress:
  enabled: true
  ingressClassName: traefik
  rules:
    - host: bwing
      paths:
        - path: /keycloak
          pathType: Prefix
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: keycloak-keycloak-headers@kubernetescrd
  tls: []

## Postgres - deployed separately, see init script
postgresql:
  enabled: false

## Readiness/liveness probes - keycloak is slow to start
startupProbe:
  httpGet:
    path: /keycloak/health
    port: 8080
  failureThreshold: 60
  periodSeconds: 5

livenessProbe:
  httpGet:
    path: /keycloak/health/live
    port: 8080
  initialDelaySeconds: 0
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /keycloak/health/ready
    port: 8080
  initialDelaySeconds: 0
  timeoutSeconds: 1