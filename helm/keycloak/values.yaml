## Keycloak Authentication
auth:
  adminUser: admin
  # Reference the secret created above for the admin password
  existingSecret: "keycloak-secrets"
  passwordSecretKey: "admin-password"

postgresql:
  enabled: true
  auth:
    # Use the secret we created above
    existingSecret: "postgres-custom-secrets"
    # The key inside the secret containing the postgres password
    secretKeys:
      adminPasswordKey: "password"
      replicationPasswordKey: "replication-password"
  
  architecture: standalone # or 'replication' for HA
  
  primary:
    persistence:
      enabled: true
      size: 4Gi
      storageClass: "local-path" # k3s default storage class
    
    # Custom resources for the DB pod
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 250m
        memory: 256Mi

externalDatabase:
  enabled: false

## Custom Environment Variables
extraEnvVars:
  - name: KC_HOSTNAME
    value: "auth.example.com"
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-custom-secrets
        key: password
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: admin-password

## Ingress Settings
ingress:
  enabled: true
  hostname: auth.example.com
  annotations:
    kubernetes.io/ingress.class: traefik
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
  tls: true